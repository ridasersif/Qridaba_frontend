<nav class="sticky top-0 z-50 w-full transition-all duration-300 border-b" [ngClass]="{
    'bg-white/80 backdrop-blur-md border-surface-200/50 py-2': isScrolled,
    'bg-white border-transparent py-4': !isScrolled
  }">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center transition-all duration-300">
        <!-- Logo area -->
        <div class="flex items-center gap-2 group cursor-pointer" routerLink="/">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center overflow-hidden">
                <img src="https://avatars.githubusercontent.com/u/245549982?s=96&v=4" alt="Qridab Logo"
                    class="w-full h-full object-cover" />
            </div>
            <span
                class="text-xl font-bold text-surface-900 tracking-tight group-hover:text-primary-600 transition-colors">Qridab</span>
        </div>

        <!-- Desktop Links -->
        <div class="hidden md:flex items-center gap-8">
            <a routerLink="/" routerLinkActive="text-primary-600 font-bold" [routerLinkActiveOptions]="{ exact: true }"
                class="text-sm font-medium text-surface-600 hover:text-primary-600 transition-colors">Home</a>
            <a href="#"
                class="text-sm font-medium text-surface-600 hover:text-primary-600 transition-colors">Services</a>
            <a href="#" class="text-sm font-medium text-surface-600 hover:text-primary-600 transition-colors">Items</a>
            <a href="#" class="text-sm font-medium text-surface-600 hover:text-primary-600 transition-colors">About
                Us</a>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-6">
            <button routerLink="/auth/login"
                class="hidden sm:block text-sm font-bold text-surface-700 hover:text-primary-600 transition-all">
                Sign In
            </button>
            <button routerLink="/auth/register"
                class="px-6 py-2.5 rounded-xl bg-[#e31b23] text-white text-sm font-bold shadow-lg shadow-red-500/20 hover:bg-[#c4161d] active:scale-[0.98] transition-all">
                Get Started
            </button>

            <!-- Mobile menu button -->
            <button (click)="isMenuOpen = !isMenuOpen"
                class="md:hidden text-surface-600 p-2 hover:bg-surface-100 rounded-lg transition-colors">
                <svg *ngIf="!isMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
                <svg *ngIf="isMenuOpen" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Mobile Menu -->
    <div class="md:hidden fixed inset-x-0 bg-white border-b border-surface-200 shadow-xl transition-all duration-300 origin-top overflow-hidden"
        [ngClass]="{ 'max-h-screen py-6': isMenuOpen, 'max-h-0 py-0': !isMenuOpen }">
        <div class="px-6 space-y-2">
            <a routerLink="/"
                class="block px-4 py-3 text-base font-semibold text-surface-700 hover:bg-surface-50 rounded-xl"
                (click)="isMenuOpen = false">Home</a>
            <a href="#" class="block px-4 py-3 text-base font-semibold text-surface-700 hover:bg-surface-50 rounded-xl"
                (click)="isMenuOpen = false">Services</a>
            <a href="#" class="block px-4 py-3 text-base font-semibold text-surface-700 hover:bg-surface-50 rounded-xl"
                (click)="isMenuOpen = false">Items</a>
            <a href="#" class="block px-4 py-3 text-base font-semibold text-surface-700 hover:bg-surface-50 rounded-xl"
                (click)="isMenuOpen = false">About Us</a>
            <div class="pt-4 flex flex-col gap-3">
                <button routerLink="/auth/login"
                    class="w-full py-4 rounded-xl border border-surface-200 text-surface-700 font-bold"
                    (click)="isMenuOpen = false">Sign In</button>
                <button routerLink="/auth/register" class="w-full py-4 rounded-xl bg-[#e31b23] text-white font-bold"
                    (click)="isMenuOpen = false">Get Started</button>
            </div>
        </div>
    </div>
</nav>
