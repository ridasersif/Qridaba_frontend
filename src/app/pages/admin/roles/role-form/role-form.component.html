<div class="space-y-6 max-w-4xl mx-auto">
  <!-- Header -->
  <div class="flex items-center gap-4">
    <a [routerLink]="['/admin/roles']" class="p-2 text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 bg-white dark:bg-slate-800 hover:bg-blue-50 dark:hover:bg-slate-700 rounded-lg border border-slate-200 dark:border-slate-700 shadow-sm transition">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
    </a>
    <div>
      <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-white mb-1">Create Role</h1>
      <p class="text-slate-500 dark:text-slate-400">Define a new role and its basic description.</p>
    </div>
  </div>

  <!-- Form Container -->
  <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-sm overflow-hidden">
    <form [formGroup]="roleForm" (ngSubmit)="onSubmit()" class="p-6 sm:p-8 space-y-6">
      
      <!-- General Info Section -->
      <div>
        <h3 class="text-lg font-semibold text-slate-800 dark:text-white mb-4 border-b border-slate-200 dark:border-slate-700 pb-2">Role Information</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Role Name</label>
            <div class="flex shadow-sm rounded-xl overflow-hidden relative">
              <span class="inline-flex items-center px-4 rounded-l-xl border border-r-0 border-slate-300 dark:border-slate-600 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 sm:text-sm font-medium">
                ROLE_
              </span>
              <input type="text" formControlName="name" placeholder="MANAGER" 
                     class="flex-1 w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50 text-slate-900 dark:text-white rounded-r-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition text-sm uppercase">
            </div>
            <span *ngIf="roleForm.get('name')?.invalid && roleForm.get('name')?.touched" class="text-red-500 text-xs mt-1 block">Role name is required.</span>
          </div>
          
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Description</label>
            <textarea formControlName="description" rows="4" placeholder="Brief description of this role's purpose..." 
                      class="w-full px-4 py-2.5 border border-slate-300 dark:border-slate-600 bg-slate-50 dark:bg-slate-700/50 text-slate-900 dark:text-white rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition shadow-sm text-sm custom-scrollbar"></textarea>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="pt-6 border-t border-slate-200 dark:border-slate-700 flex items-center justify-end gap-3">
        <button type="button" [routerLink]="['/admin/roles']" class="px-5 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition">
          Cancel
        </button>
        <button type="submit" [disabled]="roleForm.invalid" 
                class="px-5 py-2.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl text-sm font-medium shadow-md shadow-blue-500/20 transition transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
          Save Role
        </button>
      </div>

    </form>
  </div>
</div>
