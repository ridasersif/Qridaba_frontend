<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 dark:text-white mb-1">Admin Dashboard</h1>
      <p class="text-slate-500 dark:text-slate-400">Welcome back, here's an overview of Qridaba platform.</p>
    </div>
    <div class="flex gap-3 hidden sm:flex">
      <button class="px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline-block mr-1 -mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg> Export
      </button>
      <button class="px-4 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl text-sm font-medium shadow-md shadow-blue-500/20 transition transform hover:-translate-y-0.5">
        + New Report
      </button>
    </div>
  </div>

  <!-- Metrics Grid -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
    <!-- Total Users -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700/50 shadow-sm hover:shadow-md transition">
      <div class="flex items-center justify-between mb-4">
        <div class="w-10 h-10 rounded-xl bg-blue-50 dark:bg-blue-500/10 flex items-center justify-center text-blue-600 dark:text-blue-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
          </svg>
        </div>
        <span class="text-xs font-semibold text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-500/10 px-2.5 py-1 rounded-full">+12.5%</span>
      </div>
      <div>
        <h3 class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-1">Total Users</h3>
        <p class="text-2xl font-bold text-slate-800 dark:text-white">8,432</p>
      </div>
    </div>

    <!-- Active Roles -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700/50 shadow-sm hover:shadow-md transition">
      <div class="flex items-center justify-between mb-4">
        <div class="w-10 h-10 rounded-xl bg-purple-50 dark:bg-purple-500/10 flex items-center justify-center text-purple-600 dark:text-purple-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
          </svg>
        </div>
        <span class="text-xs font-semibold text-slate-600 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 px-2.5 py-1 rounded-full">Stable</span>
      </div>
      <div>
        <h3 class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-1">Active Roles</h3>
        <p class="text-2xl font-bold text-slate-800 dark:text-white">4</p>
      </div>
    </div>

    <!-- Categories -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700/50 shadow-sm hover:shadow-md transition">
      <div class="flex items-center justify-between mb-4">
        <div class="w-10 h-10 rounded-xl bg-orange-50 dark:bg-orange-500/10 flex items-center justify-center text-orange-600 dark:text-orange-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
        </div>
        <span class="text-xs font-semibold text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-500/10 px-2.5 py-1 rounded-full">+3 New</span>
      </div>
      <div>
        <h3 class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-1">Total Categories</h3>
        <p class="text-2xl font-bold text-slate-800 dark:text-white">48</p>
      </div>
    </div>

    <!-- Platform Revenue / Activity -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl p-5 border border-slate-100 dark:border-slate-700/50 shadow-sm hover:shadow-md transition">
      <div class="flex items-center justify-between mb-4">
        <div class="w-10 h-10 rounded-xl bg-rose-50 dark:bg-rose-500/10 flex items-center justify-center text-rose-600 dark:text-rose-400">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
          </svg>
        </div>
        <span class="text-xs font-semibold text-emerald-600 dark:text-emerald-400 bg-emerald-50 dark:bg-emerald-500/10 px-2.5 py-1 rounded-full">+24.1%</span>
      </div>
      <div>
        <h3 class="text-slate-500 dark:text-slate-400 text-sm font-medium mb-1">Platform Activity</h3>
        <p class="text-2xl font-bold text-slate-800 dark:text-white">High</p>
      </div>
    </div>
  </div>

  <!-- Recent Activity / Chart Placeholder -->
  <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700/50 shadow-sm p-6 max-w-4xl">
    <div class="flex items-center justify-between mb-6">
      <h3 class="text-lg font-bold text-slate-800 dark:text-white">System Metrics Overview</h3>
      <button class="text-sm font-medium text-blue-600 dark:text-blue-400 hover:underline">View All Report</button>
    </div>
    
    <div class="h-64 w-full flex items-end justify-between gap-2 border-b border-slate-200 dark:border-slate-700 pb-2 relative">
      <!-- Decorative Graph Bars -->
      <div class="w-1/12 bg-blue-100 dark:bg-blue-900/30 rounded-t-lg h-24 hover:bg-blue-200 dark:hover:bg-blue-800 transition"></div>
      <div class="w-1/12 bg-blue-200 dark:bg-blue-800/40 rounded-t-lg h-32 hover:bg-blue-300 dark:hover:bg-blue-700/50 transition"></div>
      <div class="w-1/12 bg-blue-300 dark:bg-blue-700/50 rounded-t-lg h-16 hover:bg-blue-400 dark:hover:bg-blue-600/60 transition"></div>
      <div class="w-1/12 bg-blue-400 dark:bg-blue-600/60 rounded-t-lg h-40 hover:bg-blue-500 dark:hover:bg-blue-500/70 transition"></div>
      <div class="w-1/12 bg-blue-500 dark:bg-blue-500/70 rounded-t-lg h-56 hover:bg-blue-600 dark:hover:bg-blue-400/80 transition relative group">
        <!-- Tooltip -->
        <div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white text-xs py-1 px-2 rounded opacity-0 group-hover:opacity-100 transition whitespace-nowrap">Peak Activity</div>
      </div>
      <div class="w-1/12 bg-blue-400 dark:bg-blue-600/60 rounded-t-lg h-32 hover:bg-blue-500 dark:hover:bg-blue-500/70 transition"></div>
      <div class="w-1/12 bg-blue-300 dark:bg-blue-700/50 rounded-t-lg h-48 hover:bg-blue-400 dark:hover:bg-blue-600/60 transition"></div>
      <div class="w-1/12 bg-indigo-500 dark:bg-indigo-500/70 rounded-t-lg h-60 hover:bg-indigo-600 dark:hover:bg-indigo-400/80 transition"></div>
    </div>
    <div class="flex justify-between text-xs text-slate-500 dark:text-slate-400 mt-3 px-2">
      <span>Jan</span><span>Feb</span><span>Mar</span><span>Apr</span><span>May</span><span>Jun</span><span>Jul</span><span>Aug</span>
    </div>
  </div>
</div>
